spring:
  application:
    name: VitalSync API
  datasource:
    url: jdbc:h2:mem:vitalsync;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
security:
  jwt:
    issuer: vitalsync-api
    secret: ${JWT_SECRET:vitalsync-local-development-secret-change-before-deploy}
    ttl-minutes: 60

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  h2:
    console:
      enabled: false
